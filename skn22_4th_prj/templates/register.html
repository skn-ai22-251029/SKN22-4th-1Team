<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>회원가입 - Global Drug Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-blue-50 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
      <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
        회원가입
      </h2>

      {% if error %}
      <div
        class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4"
        role="alert"
      >
        <span class="block sm:inline">{{ error }}</span>
      </div>
      {% endif %}

      <form action="/auth/register/" method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label
            class="block text-gray-700 text-sm font-bold mb-2"
            for="username"
            >아이디</label
          >
          <input
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            id="username"
            name="username"
            type="text"
            placeholder="아이디"
            required
          />
        </div>
        <div>
          <label
            class="block text-gray-700 text-sm font-bold mb-2"
            for="password"
            >비밀번호</label
          >
          <input
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline"
            id="password"
            name="password"
            type="password"
            placeholder="******************"
            required
          />
        </div>
        <div class="flex items-center justify-between">
          <button
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full"
            type="submit"
          >
            가입하기
          </button>
        </div>
      </form>
      <div class="mt-4 text-center">
        <a href="/auth/login/" class="text-blue-500 hover:text-blue-800 text-sm"
          >이미 계정이 있으신가요? 로그인</a
        >
      </div>
    </div>
  </body>
</html>
