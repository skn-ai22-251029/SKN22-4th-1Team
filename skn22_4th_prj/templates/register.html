<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - Global Drug Safety Intelligence</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --primary: #1e3a8a;
        --secondary: #3b82f6;
        --accent: #06b6d4;
        --bg-grad-1: #f8fafc;
        --bg-grad-2: #e0e7ff;
      }

      body {
        font-family: "Outfit", "Noto Sans KR", sans-serif;
        background: linear-gradient(
          135deg,
          var(--bg-grad-1) 0%,
          var(--bg-grad-2) 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .glass-card {
        backdrop-filter: blur(16px) saturate(180%);
        background: rgba(255, 255, 255, 0.7);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      }

      .input-field {
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(59, 130, 246, 0.1);
        transition: all 0.3s ease;
      }

      .input-field:focus {
        background: white;
        border-color: var(--secondary);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        outline: none;
      }

      .btn-grad {
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        transition: all 0.3s ease;
      }

      .btn-grad:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(30, 58, 138, 0.25);
      }

      .hidden-input {
        display: none;
        animation: slideDown 0.3s ease-out;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── 자동완성 스타일 ── */
      .autocomplete-wrapper {
        position: relative;
      }
      .autocomplete-dropdown {
        position: absolute;
        left: 0; right: 0;
        top: 100%;
        margin-top: 4px;
        background: white;
        border: 1px solid rgba(59,130,246,0.2);
        border-radius: 12px;
        box-shadow: 0 12px 32px rgba(0,0,0,0.10);
        max-height: 240px;
        overflow-y: auto;
        z-index: 50;
        display: none;
      }
      .autocomplete-dropdown.show { display: block; }
      .autocomplete-item {
        padding: 10px 16px;
        cursor: pointer;
        font-size: 14px;
        color: #334155;
        transition: background 0.15s;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .autocomplete-item:first-child { border-radius: 12px 12px 0 0; }
      .autocomplete-item:last-child  { border-radius: 0 0 12px 12px; }
      .autocomplete-item:hover,
      .autocomplete-item.active {
        background: linear-gradient(135deg, #eff6ff, #e0e7ff);
      }
      .autocomplete-item .drug-name {
        font-weight: 500;
      }
      .autocomplete-item .drug-company {
        color: #94a3b8;
        font-size: 12px;
        white-space: nowrap;
      }
      .autocomplete-no-result {
        padding: 14px 16px;
        text-align: center;
        color: #94a3b8;
        font-size: 13px;
      }

      /* +추가 버튼 */
      .med-input-row {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      .med-input-row .autocomplete-wrapper {
        flex: 1;
      }
      .btn-add-med {
        flex-shrink: 0;
        padding: 0 18px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--secondary), var(--accent));
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 4px;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
      }
      .btn-add-med:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
      }
      .btn-add-med:active {
        transform: scale(0.97);
      }
      .btn-add-med:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* 선택된 약 태그 */
      .med-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .med-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: linear-gradient(135deg, #eff6ff, #dbeafe);
        color: #1e40af;
        font-size: 13px;
        font-weight: 500;
        padding: 5px 10px 5px 12px;
        border-radius: 20px;
        border: 1px solid rgba(59,130,246,0.15);
        animation: slideDown 0.2s ease-out;
      }
      .med-tag button {
        background: none;
        border: none;
        cursor: pointer;
        color: #60a5fa;
        font-size: 16px;
        line-height: 1;
        padding: 0 2px;
        transition: color 0.15s;
      }
      .med-tag button:hover { color: #dc2626; }
    </style>
  </head>
  <body>
    <div class="glass-card w-full max-w-xl p-8 md:p-12">
      <a href="/" style="display:inline-flex;align-items:center;gap:6px;color:#3b82f6;font-weight:600;font-size:0.9rem;text-decoration:none;margin-bottom:1.5rem;transition:color 0.2s;" onmouseover="this.style.color='#1e3a8a'" onmouseout="this.style.color='#3b82f6'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        홈으로 돌아가기
      </a>
      <div class="text-center mb-10">
        <div
          class="inline-block w-12 h-12 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-xl mb-4 shadow-lg shadow-cyan-500/30"
        ></div>
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">
          회원가입
        </h1>
        <p class="text-slate-500 mt-2 font-light">
          당신을 위한 맞춤형 안전 가이드를 시작하세요
        </p>
      </div>

      {% if error %}
      <div
        class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-8 rounded shadow-sm"
      >
        <p class="text-sm font-medium">{{ error }}</p>
      </div>
      {% endif %}

      <form
        action="/auth/register/"
        method="post"
        id="registerForm"
        class="space-y-6"
      >
        {% csrf_token %}

        <div class="space-y-6">
          <!-- 이메일 -->
          <div>
            <label
              class="block text-slate-700 text-sm font-semibold mb-2"
              for="email"
              >이메일</label
            >
            <input
              type="email"
              name="email"
              id="email"
              class="input-field w-full px-4 py-3 rounded-xl text-slate-700"
              placeholder="example@email.com"
              required
            />
            <p
              id="email_error"
              class="text-red-500 text-xs mt-1 ml-1"
              style="display: none"
            ></p>
          </div>
          <!-- 비밀번호 -->
          <div>
            <label
              class="block text-slate-700 text-sm font-semibold mb-2"
              for="password"
              >비밀번호</label
            >
            <input
              type="password"
              name="password"
              id="password"
              class="input-field w-full px-4 py-3 rounded-xl text-slate-700"
              placeholder="6자 이상 권장"
              required
            />
          </div>
          <!-- 비밀번호 확인 -->
          <div>
            <label
              class="block text-slate-700 text-sm font-semibold mb-2"
              for="password_confirm"
              >비밀번호 확인</label
            >
            <input
              type="password"
              name="password_confirm"
              id="password_confirm"
              class="input-field w-full px-4 py-3 rounded-xl text-slate-700"
              placeholder="다시 한번 입력해주세요"
              required
            />
            <p
              id="pw_error"
              class="text-red-500 text-xs mt-1 ml-1"
              style="display: none"
            >
              비밀번호가 서로 일치하지 않습니다.
            </p>
          </div>
        </div>

        <!-- 복용 중인 약 (자동완성) -->
        <div>
          <label
            class="block text-slate-700 text-sm font-semibold mb-2"
            >현재 복용 중인 약</label
          >
          <div class="med-input-row">
            <div class="autocomplete-wrapper">
              <input
                type="text"
                id="med_search"
                autocomplete="off"
                class="input-field w-full px-4 py-3 rounded-xl text-slate-700"
                placeholder="약 이름을 검색하세요 (예: 타이레놀)"
              />
              <div id="med_dropdown" class="autocomplete-dropdown"></div>
            </div>
            <button type="button" id="btn_add_med" class="btn-add-med" disabled>
              +추가
            </button>
          </div>
          <!-- 선택된 약 태그 -->
          <div id="med_tags" class="med-tags"></div>
          <!-- 서버로 전송할 hidden input -->
          <input type="hidden" name="current_medications" id="medications_hidden" value="" />
        </div>

        <!-- 임신 여부 -->
        <div
          class="flex items-center gap-3 p-4 bg-white/50 rounded-xl border border-slate-100"
        >
          <input
            type="checkbox"
            name="is_pregnant"
            id="is_pregnant"
            class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
          />
          <label for="is_pregnant" class="text-slate-700 font-medium"
            >현재 임신 중이거나 수유 중이십니까?</label
          >
        </div>

        <!-- 기저질환 -->
        <div class="space-y-4">
          <div
            class="flex items-center gap-3 p-4 bg-white/50 rounded-xl border border-slate-100"
          >
            <input
              type="checkbox"
              name="has_disease"
              id="has_disease"
              onchange="toggleInput('has_disease', 'disease_box')"
              class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
            />
            <label for="has_disease" class="text-slate-700 font-medium"
              >기저질환이 있으십니까?</label
            >
          </div>
          <div id="disease_box" class="hidden-input">
            <div class="med-input-row">
              <input
                type="text"
                id="disease_input"
                autocomplete="off"
                class="input-field w-full px-4 py-3 rounded-xl text-slate-700"
                placeholder="질환명을 입력해주세요 (예: 당뇨, 고혈압)"
              />
              <button type="button" id="btn_add_disease" class="btn-add-med" disabled>
                +추가
              </button>
            </div>
            <div id="disease_tags" class="med-tags"></div>
            <input type="hidden" name="chronic_diseases" id="disease_hidden" value="" />
          </div>
        </div>

        <!-- 알레르기 -->
        <div class="space-y-4">
          <div
            class="flex items-center gap-3 p-4 bg-white/50 rounded-xl border border-slate-100"
          >
            <input
              type="checkbox"
              name="has_allergy"
              id="has_allergy"
              onchange="toggleInput('has_allergy', 'allergy_box')"
              class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
            />
            <label for="has_allergy" class="text-slate-700 font-medium"
              >약물 또는 음식 알레르기가 있으십니까?</label
            >
          </div>
          <div id="allergy_box" class="hidden-input">
            <div class="med-input-row">
              <input
                type="text"
                id="allergy_input"
                autocomplete="off"
                class="input-field w-full px-4 py-3 rounded-xl text-slate-700"
                placeholder="알레르기 원인을 입력해주세요 (예: 항생제, 땅콩)"
              />
              <button type="button" id="btn_add_allergy" class="btn-add-med" disabled>
                +추가
              </button>
            </div>
            <div id="allergy_tags" class="med-tags"></div>
            <input type="hidden" name="allergies" id="allergy_hidden" value="" />
          </div>
        </div>

        <button
          type="submit"
          class="btn-grad w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg hover:brightness-110 active:scale-[0.98]"
        >
          회원가입 완료
        </button>
      </form>

      <div class="mt-8 text-center text-slate-500 text-sm">
        이미 계정이 있으신가요?
        <a
          href="/auth/login/"
          class="text-blue-600 font-semibold hover:underline"
          >로그인 하기</a
        >
      </div>
    </div>

    <script>
      function toggleInput(checkboxId, targetId) {
        const checkbox = document.getElementById(checkboxId);
        const target = document.getElementById(targetId);
        if (checkbox.checked) {
          target.style.display = "block";
        } else {
          target.style.display = "none";
        }
      }

      // ── 약 자동완성 ──
      const medSearch   = document.getElementById("med_search");
      const medDropdown = document.getElementById("med_dropdown");
      const medTags     = document.getElementById("med_tags");
      const medHidden   = document.getElementById("medications_hidden");

      let selectedMeds = [];   // 선택된 약 목록 (item_name 값들)
      let debounceTimer = null;
      let activeIdx = -1;      // 키보드 탐색 인덱스

      function syncHiddenInput() {
        medHidden.value = selectedMeds.join(", ");
      }

      function renderTags() {
        medTags.innerHTML = "";
        selectedMeds.forEach((name, idx) => {
          const tag = document.createElement("span");
          tag.className = "med-tag";
          tag.innerHTML = `${name}<button type="button" data-idx="${idx}" aria-label="삭제">&times;</button>`;
          medTags.appendChild(tag);
        });
        // 삭제 버튼 이벤트
        medTags.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => {
            selectedMeds.splice(Number(btn.dataset.idx), 1);
            renderTags();
            syncHiddenInput();
          });
        });
      }

      let pendingDrug = null;  // 드롭다운에서 선택한 약 (추가 대기)
      const btnAddMed = document.getElementById("btn_add_med");

      function selectDrug(itemName) {
        // 드롭다운에서 선택 → 입력창에 표시하고 추가 대기 상태
        medSearch.value = itemName;
        pendingDrug = itemName;
        btnAddMed.disabled = false;
        hideDropdown();
      }

      function addPendingDrug() {
        if (pendingDrug && !selectedMeds.includes(pendingDrug)) {
          selectedMeds.push(pendingDrug);
          renderTags();
          syncHiddenInput();
        }
        medSearch.value = "";
        pendingDrug = null;
        btnAddMed.disabled = true;
        medSearch.focus();
      }

      btnAddMed.addEventListener("click", addPendingDrug);

      function hideDropdown() {
        medDropdown.classList.remove("show");
        medDropdown.innerHTML = "";
        activeIdx = -1;
      }

      function showDropdown(items) {
        medDropdown.innerHTML = "";
        activeIdx = -1;

        if (items.length === 0) {
          medDropdown.innerHTML = '<div class="autocomplete-no-result">검색 결과가 없습니다</div>';
          medDropdown.classList.add("show");
          return;
        }

        items.forEach((item, i) => {
          const div = document.createElement("div");
          div.className = "autocomplete-item";
          div.dataset.index = i;
          div.innerHTML = `<span class="drug-name">${item.item_name}</span><span class="drug-company">${item.entp_name || ""}</span>`;
          div.addEventListener("mousedown", (e) => {
            e.preventDefault();          // blur 방지
            selectDrug(item.item_name);
          });
          medDropdown.appendChild(div);
        });
        medDropdown.classList.add("show");
      }

      function highlightItem(idx) {
        const items = medDropdown.querySelectorAll(".autocomplete-item");
        items.forEach(el => el.classList.remove("active"));
        if (idx >= 0 && idx < items.length) {
          items[idx].classList.add("active");
          items[idx].scrollIntoView({ block: "nearest" });
        }
      }

      medSearch.addEventListener("input", () => {
        const q = medSearch.value.trim();
        clearTimeout(debounceTimer);

        // 사용자가 입력을 수정하면 대기 중인 약 초기화
        pendingDrug = null;
        btnAddMed.disabled = true;

        if (q.length < 1) {
          hideDropdown();
          return;
        }

        debounceTimer = setTimeout(() => {
          fetch(`/drug/search/?q=${encodeURIComponent(q)}`)
            .then(res => res.json())
            .then(data => {
              // 검색어 위치 기준 정렬: item_name에서 검색어가 앞에 올수록 우선
              const qLower = q.toLowerCase();
              data.sort((a, b) => {
                const posA = (a.item_name || "").toLowerCase().indexOf(qLower);
                const posB = (b.item_name || "").toLowerCase().indexOf(qLower);
                // 검색어가 없으면 맨 뒤로
                const sA = posA === -1 ? 9999 : posA;
                const sB = posB === -1 ? 9999 : posB;
                return sA - sB;
              });
              showDropdown(data);
            })
            .catch(() => hideDropdown());
        }, 300);
      });

      medSearch.addEventListener("keydown", (e) => {
        const items = medDropdown.querySelectorAll(".autocomplete-item");
        if (!items.length) return;

        if (e.key === "ArrowDown") {
          e.preventDefault();
          activeIdx = Math.min(activeIdx + 1, items.length - 1);
          highlightItem(activeIdx);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          activeIdx = Math.max(activeIdx - 1, 0);
          highlightItem(activeIdx);
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (activeIdx >= 0) {
            items[activeIdx].dispatchEvent(new Event("mousedown"));
          } else if (pendingDrug) {
            addPendingDrug();
          }
        } else if (e.key === "Escape") {
          hideDropdown();
        }
      });

      medSearch.addEventListener("blur", () => {
        // 약간의 지연으로 클릭 이벤트가 먼저 실행되도록 함
        setTimeout(hideDropdown, 200);
      });

      // ── 기저질환 & 알레르기 태그 관리 (공통 팩토리) ──
      function createTagManager(inputId, btnId, tagsId, hiddenId) {
        const input  = document.getElementById(inputId);
        const btn    = document.getElementById(btnId);
        const tagsEl = document.getElementById(tagsId);
        const hidden = document.getElementById(hiddenId);
        const items  = [];

        function sync() {
          hidden.value = items.join(", ");
        }

        function render() {
          tagsEl.innerHTML = "";
          items.forEach((name, idx) => {
            const tag = document.createElement("span");
            tag.className = "med-tag";
            tag.innerHTML = `${name}<button type="button" data-idx="${idx}" aria-label="삭제">&times;</button>`;
            tagsEl.appendChild(tag);
          });
          tagsEl.querySelectorAll("button").forEach(b => {
            b.addEventListener("click", () => {
              items.splice(Number(b.dataset.idx), 1);
              render();
              sync();
            });
          });
        }

        function addItem() {
          const val = input.value.trim();
          if (val && !items.includes(val)) {
            items.push(val);
            render();
            sync();
          }
          input.value = "";
          btn.disabled = true;
          input.focus();
        }

        input.addEventListener("input", () => {
          btn.disabled = input.value.trim().length === 0;
        });

        btn.addEventListener("click", addItem);

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            if (input.value.trim().length > 0) addItem();
          }
        });
      }

      // 기저질환 태그 매니저 초기화
      createTagManager("disease_input", "btn_add_disease", "disease_tags", "disease_hidden");
      // 알레르기 태그 매니저 초기화
      createTagManager("allergy_input", "btn_add_allergy", "allergy_tags", "allergy_hidden");

      // ── 회원가입 폼 제출 ──
      document.getElementById("registerForm").onsubmit = function (e) {
        e.preventDefault();

        const pw = document.getElementById("password").value;
        const pwConfirm = document.getElementById("password_confirm").value;
        const pwErrorText = document.getElementById("pw_error");
        const emailErrorText = document.getElementById("email_error");

        pwErrorText.style.display = "none";
        emailErrorText.style.display = "none";

        if (pw !== pwConfirm) {
          pwErrorText.style.display = "block";
          document.getElementById("password_confirm").focus();
          return false;
        }

        const formData = new FormData(this);
        const csrfToken = document.querySelector(
          "[name=csrfmiddlewaretoken]",
        ).value;

        fetch(this.action, {
          method: "POST",
          body: formData,
          headers: {
            "X-Requested-With": "XMLHttpRequest",
            "X-CSRFToken": csrfToken,
          },
        })
          .then((response) =>
            response
              .json()
              .then((data) => ({ status: response.status, body: data })),
          )
          .then((result) => {
            const data = result.body;
            if (result.status === 200 && data.status === "success") {
              window.location.href = data.redirect;
            } else {
              if (data.code === "user_exists") {
                emailErrorText.textContent = data.message;
                emailErrorText.style.display = "block";
                document.getElementById("email").focus();
              } else {
                alert(data.message || "회원가입 중 오류가 발생했습니다.");
              }
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("서버 통신 오류가 발생했습니다.");
          });

        return false;
      };
    </script>
  </body>
