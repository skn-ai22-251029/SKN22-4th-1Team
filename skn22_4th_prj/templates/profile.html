<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>내 건강 정보 - Global Drug Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-blue-50 min-h-screen">
    <nav class="bg-white shadow">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex">
            <a
              href="/"
              class="flex-shrink-0 flex items-center text-blue-600 font-bold text-xl"
            >
              Global Drug Safety
            </a>
          </div>
          <div class="flex items-center space-x-4">
            <span class="text-gray-700 font-medium">{{ user.username }}님</span>
            <form action="/auth/logout/" method="post" style="display: inline">
              {% csrf_token %}
              <button
                type="submit"
                class="text-red-500 hover:text-red-700 font-medium"
              >
                로그아웃
              </button>
            </form>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-2xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
      <div class="bg-white shadow overflow-hidden sm:rounded-lg">
        <div class="px-4 py-5 sm:px-6 border-b border-gray-200">
          <h3 class="text-lg leading-6 font-medium text-gray-900">
            내 건강 정보
          </h3>
          <p class="mt-1 max-w-2xl text-sm text-gray-500">
            정확한 약물 추천과 위험 경고를 위해 정보를 입력해주세요.
          </p>
        </div>

        <form
          action="/user/profile/"
          method="post"
          class="px-4 py-5 sm:p-6 space-y-6"
        >
          {% csrf_token %}
          <div>
            <label
              for="medications"
              class="block text-sm font-medium text-gray-700"
              >복용 중인 약</label
            >
            <div class="mt-1 relative">
              <div class="flex gap-2">
                <div class="relative flex-grow">
                  <input
                    type="text"
                    id="drugSearchInput"
                    class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border border-gray-300 rounded-md p-2 pr-10"
                    placeholder="약품명 또는 업체명 검색 (예: 타이레놀)"
                  />
                  <button
                    type="button"
                    onclick="toggleDropdown()"
                    class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500 hover:text-blue-600 focus:outline-none"
                  >
                    <svg
                      class="h-5 w-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 9l-7 7-7-7"
                      ></path>
                    </svg>
                  </button>
                </div>
                <button
                  type="button"
                  onclick="searchDrugs()"
                  class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 text-sm whitespace-nowrap"
                >
                  검색
                </button>
              </div>

              <div
                id="drugSearchResults"
                class="absolute z-10 mt-1 w-full bg-white shadow-lg max-h-60 rounded-md py-1 text-base ring-1 ring-black ring-opacity-5 overflow-auto focus:outline-none sm:text-sm hidden"
              ></div>
              <div id="searchStatus" class="mt-1 text-xs text-gray-400"></div>

              <div
                id="selectedDrugsContainer"
                class="flex flex-wrap gap-2 mt-2"
              ></div>

              <textarea
                id="medications"
                name="medications"
                rows="3"
                class="hidden"
              >
{{ profile.current_medications|default:'' }}</textarea
              >
            </div>
          </div>

          <div>
            <label
              for="allergies"
              class="block text-sm font-medium text-gray-700"
              >알러지 정보</label
            >
            <div class="mt-1">
              <textarea
                id="allergies"
                name="allergies"
                rows="3"
                class="shadow-sm focus:ring-blue-500 focus:border-blue-500 mt-1 block w-full sm:text-sm border border-gray-300 rounded-md p-2"
                placeholder="예: 땅콩, 페니실린"
              >
{{ profile.allergies|default:'' }}</textarea
              >
            </div>
          </div>

          <div>
            <label
              for="diseases"
              class="block text-sm font-medium text-gray-700"
              >기저질환</label
            >
            <div class="mt-1">
              <textarea
                id="diseases"
                name="diseases"
                rows="3"
                class="shadow-sm focus:ring-blue-500 focus:border-blue-500 mt-1 block w-full sm:text-sm border border-gray-300 rounded-md p-2"
                placeholder="예: 고혈압, 당뇨"
              >
{{ profile.chronic_diseases|default:'' }}</textarea
              >
            </div>
          </div>

          <div class="pt-5">
            <div class="flex justify-end">
              <a
                href="/"
                type="button"
                class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
              >
                취소
              </a>
              <button
                type="submit"
                class="ml-3 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
              >
                저장하기
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <script>
      const searchInput = document.getElementById("drugSearchInput");
      const resultsContainer = document.getElementById("drugSearchResults");
      const selectedContainer = document.getElementById(
        "selectedDrugsContainer",
      );
      const hiddenInput = document.getElementById("medications");
      const statusDiv = document.getElementById("searchStatus");

      let selectedDrugs = [];

      const initialValue = hiddenInput.value;
      if (initialValue) {
        selectedDrugs = initialValue
          .split(",")
          .map((s) => s.trim())
          .filter((s) => s);
        renderSelectedDrugs();
      }

      let debounceTimer;
      searchInput.addEventListener("input", function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const query = searchInput.value.trim();
          if (query.length > 0) {
            searchDrugs();
          } else {
            resultsContainer.classList.add("hidden");
          }
        }, 300);
      });

      searchInput.addEventListener("focus", function () {
        if (searchInput.value.trim().length > 0) {
          searchDrugs();
        }
      });

      searchInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          if (
            !resultsContainer.classList.contains("hidden") &&
            resultsContainer.children.length > 0
          ) {
            const firstItem = resultsContainer.children[0];
            if (firstItem) firstItem.click();
          } else {
            addDrug(searchInput.value);
          }
        }
      });

      window.toggleDropdown = function () {
        if (resultsContainer.classList.contains("hidden")) {
          searchDrugs(true);
        } else {
          resultsContainer.classList.add("hidden");
        }
      };

      window.searchDrugs = async function (showAll = false) {
        const query = searchInput.value.trim();
        if (!query && !showAll) return;

        if (statusDiv) statusDiv.textContent = "검색 중...";

        try {
          const response = await fetch(
            `/drugs/search/?q=${encodeURIComponent(query)}`,
          );
          if (!response.ok) {
            throw new Error(`HTTP Check: ${response.status}`);
          }
          const data = await response.json();
          const results = data.results || data; // Handle both direct list and {results: []}
          if (statusDiv)
            statusDiv.textContent = `검색 완료: ${results.length}건 발견`;
          renderSearchResults(results);
        } catch (error) {
          console.error("Error searching drugs:", error);
          if (statusDiv) statusDiv.textContent = `오류 발생: ${error.message}`;
          resultsContainer.innerHTML = `<div class="px-3 py-2 text-red-500 text-sm">오류: ${error.message}</div>`;
          resultsContainer.classList.remove("hidden");
        }
      };

      function renderSearchResults(results) {
        resultsContainer.innerHTML = "";
        if (results.length > 0) {
          resultsContainer.classList.remove("hidden");
          results.forEach((drug) => {
            const div = document.createElement("div");
            div.className =
              "cursor-pointer select-none relative py-2 pl-3 pr-9 hover:bg-blue-50 text-gray-900 border-b border-gray-100 last:border-0";
            div.innerHTML = `<span class="font-medium text-gray-800">${drug.item_name}</span> <span class="text-xs text-gray-500 block">${drug.entp_name || ""}</span>`;
            div.onclick = () => {
              addDrug(drug.item_name);
              resultsContainer.classList.add("hidden");
              searchInput.value = "";
              searchInput.focus();
            };
            resultsContainer.appendChild(div);
          });
        } else {
          resultsContainer.innerHTML =
            '<div class="px-3 py-2 text-gray-500 text-sm">검색 결과가 없습니다.</div>';
          resultsContainer.classList.remove("hidden");
        }
      }

      function addDrug(name) {
        const cleanName = name.trim();
        if (cleanName && !selectedDrugs.includes(cleanName)) {
          selectedDrugs.push(cleanName);
          renderSelectedDrugs();
          updateHiddenInput();
          searchInput.value = "";
          resultsContainer.classList.add("hidden");
        }
      }

      window.removeDrug = function (name) {
        selectedDrugs = selectedDrugs.filter((d) => d !== name);
        renderSelectedDrugs();
        updateHiddenInput();
      };

      function renderSelectedDrugs() {
        selectedContainer.innerHTML = "";
        selectedDrugs.forEach((drug) => {
          const chip = document.createElement("div");
          chip.className =
            "bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded flex items-center";
          chip.innerHTML = `
                ${drug}
                <button type="button" onclick="removeDrug('${drug}')" class="ml-2 text-blue-600 hover:text-blue-900 focus:outline-none">
                    <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
                `;
          selectedContainer.appendChild(chip);
        });
      }

      function updateHiddenInput() {
        if (hiddenInput) hiddenInput.value = selectedDrugs.join(", ");
      }

      document.addEventListener("click", function (e) {
        if (
          searchInput &&
          resultsContainer &&
          !searchInput.contains(e.target) &&
          !resultsContainer.contains(e.target)
        ) {
          resultsContainer.classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
