<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - GDSI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --ink-900: #07211d;
        --ink-700: #2b4a44;
        --line: #d2e7df;
        --brand-700: #006d5b;
        --brand-600: #00806a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Sora", "Noto Sans KR", sans-serif;
        color: var(--ink-900);
        background:
          radial-gradient(800px 360px at 105% -10%, #d9fff3 0%, transparent 60%),
          radial-gradient(700px 300px at -10% 100%, #ffe8cf 0%, transparent 60%),
          #f4faf7;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .card {
        width: min(460px, 100%);
        border-radius: 22px;
        background: #ffffff;
        border: 1px solid var(--line);
        box-shadow: 0 20px 40px rgba(4, 37, 32, 0.1);
        padding: 1.8rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 1rem;
      }

      .mark {
        width: 2rem;
        height: 2rem;
        border-radius: 0.65rem;
        background: linear-gradient(135deg, var(--brand-700), var(--brand-600));
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        letter-spacing: -0.02em;
      }

      .muted {
        margin: 0.4rem 0 1.1rem;
        color: var(--ink-700);
        font-size: 0.9rem;
      }

      .error {
        background: #fff1ef;
        color: #b5402a;
        border: 1px solid #ffd1c9;
        border-radius: 12px;
        padding: 0.75rem;
        margin-bottom: 1rem;
        font-size: 0.88rem;
      }

      .field {
        margin-bottom: 0.85rem;
      }

      label {
        display: block;
        font-weight: 700;
        font-size: 0.82rem;
        margin-bottom: 0.42rem;
      }

      input {
        width: 100%;
        border: 1px solid #c9ddd5;
        border-radius: 12px;
        padding: 0.82rem 0.9rem;
        font: inherit;
        outline: none;
      }

      input:focus {
        border-color: #5ecfb5;
        box-shadow: 0 0 0 4px rgba(0, 128, 106, 0.13);
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 0.86rem;
        font: inherit;
        font-weight: 700;
        color: #ffffff;
        background: linear-gradient(135deg, var(--brand-700), var(--brand-600));
        cursor: pointer;
        margin-top: 0.4rem;
      }

      .links {
        margin-top: 1rem;
        display: grid;
        gap: 0.45rem;
      }

      .links a {
        text-decoration: none;
        font-size: 0.86rem;
        color: #1f5f53;
      }

      .links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div class="brand">
        <span class="mark" aria-hidden="true"></span>
        <h1>로그인</h1>
      </div>
      <p class="muted">약물 안전성 검색을 계속하려면 로그인하세요.</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form action="/auth/login/" method="post">
        {% csrf_token %}
        <div class="field">
          <label for="email">이메일</label>
          <input id="email" name="email" type="email" placeholder="example@email.com" required />
        </div>

        <div class="field">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" placeholder="비밀번호" required />
        </div>

        <button type="submit">로그인</button>
      </form>

      <div class="links">
        <a href="/auth/register/">계정이 없나요? 회원가입</a>
        <a href="/">메인으로 돌아가기</a>
      </div>
    </main>
  </body>
</html>
